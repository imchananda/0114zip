<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#12121A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#FDD835"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow-yellow" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FDD835;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FDD835;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="32" cy="32" r="45" fill="url(#glow-blue)"/>
  <circle cx="96" cy="96" r="45" fill="url(#glow-yellow)"/>
  <!-- NF text -->
  <text x="64" y="68.5" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="45" fill="url(#brand)" text-anchor="middle" dominant-baseline="middle">NF</text>
  <!-- Gradient bar -->
  <rect x="32" y="92" width="64" height="3" rx="2" fill="url(#brand)"/>
</svg>