<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0F"/>
      <stop offset="100%" style="stop-color:#12121A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#FDD835"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow-yellow" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FDD835;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FDD835;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="96" height="96" rx="19" fill="url(#bg)"/>
  <!-- Glow orbs -->
  <circle cx="24" cy="24" r="34" fill="url(#glow-blue)"/>
  <circle cx="72" cy="72" r="34" fill="url(#glow-yellow)"/>
  <!-- NF text -->
  <text x="48" y="51.4" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="34" fill="url(#brand)" text-anchor="middle" dominant-baseline="middle">NF</text>
  <!-- Gradient bar -->
  <rect x="24" y="69" width="48" height="2" rx="1" fill="url(#brand)"/>
</svg>